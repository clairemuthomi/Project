  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --m0:#0a1a0e;--m1:#1a3320;--m2:#2a5c3a;--m3:#4a8c5c;--m4:#6abf7c;
      --m5:#a8d8a8;--m6:#c8ecc8;--m7:#e8f8e8;--m8:#f2fbf2;
      --matcha:#7ab648;--matcha-light:#b5d99c;--matcha-pale:#e0f0d0;
      --white:#ffffff;--cream:#f8fdf5;--text-dk:#0f1f14;--text-md:#2d4a35;--text-lt:#6a9470;--gold:#c9a84c;
    }
     html{scroll-behavior:smooth}
    body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--text-dk);line-height:1.6;overflow-x:hidden}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--m7)}::-webkit-scrollbar-thumb{background:var(--m3);border-radius:3px}
    nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:16px 64px;background:rgba(10,26,14,0.94);backdrop-filter:blur(12px);border-bottom:1px solid rgba(106,191,124,0.15)}
    .nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.8rem;color:var(--m6);letter-spacing:0.06em;text-decoration:none}
    .nav-logo em{color:var(--matcha);font-style:italic}
    .nav-links{display:flex;gap:32px;list-style:none;align-items:center}
    .nav-links a{color:var(--m5);text-decoration:none;font-size:0.8rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;transition:color .2s}
    .nav-links a:hover,.nav-links a.active{color:var(--matcha-light)}
    .nav-reserve-btn{padding:9px 22px;border-radius:50px;background:var(--matcha);color:var(--m0);font-size:0.78rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;text-decoration:none;transition:background .2s,transform .15s}
    .nav-reserve-btn:hover{background:var(--matcha-light);transform:translateY(-1px)}
    section{padding:100px 24px}
    .container{max-width:1240px;margin:0 auto}
    .s-label{font-size:0.7rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--matcha);margin-bottom:10px;display:block}
    .s-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.2rem,4.5vw,3.6rem);color:var(--m1);line-height:1.1;margin-bottom:16px}
    .s-sub{font-size:1rem;color:var(--text-md);max-width:520px;font-weight:300;line-height:1.75}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
    .form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
    .form-group label{font-size:0.78rem;font-weight:600;color:var(--text-md);letter-spacing:0.06em;text-transform:uppercase}
    .form-group input,.form-group select,.form-group textarea{padding:13px 16px;border-radius:12px;border:1.5px solid var(--m6);background:var(--m8);font-family:'Inter',sans-serif;font-size:0.92rem;color:var(--text-dk);transition:border-color .2s,box-shadow .2s;outline:none}
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--matcha);box-shadow:0 0 0 3px rgba(122,182,72,0.12)}
    .form-group textarea{resize:vertical;min-height:80px}
    .btn-submit{width:100%;padding:16px;border-radius:50px;background:var(--matcha);color:var(--m0);font-family:'Inter',sans-serif;font-size:0.9rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;border:none;cursor:pointer;transition:all .25s;box-shadow:0 4px 20px rgba(122,182,72,0.3)}
